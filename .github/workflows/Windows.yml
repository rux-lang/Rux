name: Windows

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Allow cancelling superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CMAKE_VERSION: "4.3.3"
  NINJA_VERSION: "1.13.2"

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            runner: windows-2025
            vs_arch: amd64
            compiler_target: x86_64-pc-windows-msvc
            artifact: rux-windows-x86_64
          - arch: aarch64
            label: AArch64
            runner: windows-11-arm
            vs_arch: arm64
            compiler_target: aarch64-pc-windows-msvc
            artifact: rux-windows-aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: ${{ env.NINJA_VERSION }}

      # Initialize the bundled Visual Studio environment so Clang can find
      # the Windows SDK, CRT headers, and import libraries.
      - name: Configure and build
        shell: pwsh
        run: |
          ./.github/scripts/Enter-VsDevEnv.ps1 -Arch ${{ matrix.vs_arch }}

          cmake -S . -B Build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_COMPILER=clang++ `
            -DCMAKE_CXX_COMPILER_TARGET=${{ matrix.compiler_target }} `
            -DRUX_WERROR=ON `
            -DRUX_BUILD_TESTS=ON
          cmake --build Build --config Release --parallel

      - name: Unit tests
        shell: pwsh
        run: |
          ./.github/scripts/Enter-VsDevEnv.ps1 -Arch ${{ matrix.vs_arch }}
          ctest --test-dir Build --output-on-failure -C Release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: Bin/rux.exe
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test (${{ matrix.label }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            runner: windows-2025
            vs_arch: amd64
            artifact: rux-windows-x86_64
          - arch: aarch64
            label: AArch64
            runner: windows-11-arm
            vs_arch: arm64
            artifact: rux-windows-aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: Bin

      - name: Verify Rux workspace
        shell: pwsh
        run: |
          ./.github/scripts/Enter-VsDevEnv.ps1 -Arch ${{ matrix.vs_arch }}
          ./Bin/rux.exe check
          ./Bin/rux.exe lint
          ./Bin/rux.exe test --release
