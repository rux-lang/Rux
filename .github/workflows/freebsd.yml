name: FreeBSD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: FreeBSD x86-64

    steps:
      - uses: actions/checkout@v5

      - name: Build and test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1.4.6
        with:
          usesh: true
          copyback: false
          prepare: |
            uname -a
            pkg install -y cmake llvm

          run: |
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
            echo "---MINIMAL TEST (no imports)---"
            mkdir -p minimal_test/Src
            printf 'func Main() -> int { return 0; }\n' > minimal_test/Src/Main.rux
            printf '[Package]\nName = "minimal"\nType = "bin"\n[Build]\nOutput = "Bin"\n' > minimal_test/Rux.toml
            cd minimal_test && ../build/rux build && ../build/rux run; echo "exit: $?"
            echo "---MINIMAL TEST DONE---"
            cd ..
            echo "---ECHO TEST---"
            mkdir -p echo_test/Src
            printf '[Package]\nName = "echo_test"\nType = "bin"\n[Build]\nOutput = "Bin"\n' > echo_test/Rux.toml
            printf '@[Import(lib: "kernel32")]\nextern func GetStdHandle(handle: int) -> int;\n@[Import(lib: "kernel32")]\nextern func WriteFile(handle: int, buffer: *char8, count: uint64, written: *uint64, overlapped: int) -> bool;\nfunc Main() -> int { let text = c8"hello\\n"; var w: uint64 = 0; WriteFile(GetStdHandle(-11), text.data, text.length, &w, 0); return 0; }\n' > echo_test/Src/Main.rux
            cd echo_test && ../build/rux build && ../build/rux run; echo "exit: $?"
            echo "---ECHO TEST DONE---"
            cd ..
