name: FreeBSD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: FreeBSD x86-64

    steps:
      - uses: actions/checkout@v5

      - name: Build and test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1.4.6
        with:
          usesh: true
          copyback: false
          prepare: |
            uname -a
            pkg install -y cmake llvm

          run: |
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
            ctest --test-dir build --output-on-failure
