name: FreeBSD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: FreeBSD x86-64

    steps:
      - uses: actions/checkout@v5

      - name: Build and test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: false
          prepare: |
            uname -a
            pkg install -y cmake llvm

          run: |
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
            echo "---BASIC TEST---"
            mkdir -p test_simple/Src
            printf 'import Std::Io::Print;\nfunc Main() -> int { Print("hello\\n"); return 0; }\n' > test_simple/Src/Main.rux
            printf '[Package]\nName = "test"\nType = "bin"\n[Build]\nOutput = "Bin"\n[Dependencies]\nStd = "*"\n' > test_simple/Rux.toml
            cd test_simple && ../build/rux build && ../build/rux run
            echo "---BASIC TEST DONE---"
            cd ..
            ./Tests/run_io_test.sh "$PWD/build/rux"
            ./Tests/run_pow_test.sh "$PWD/build/rux"
            ./Tests/run_unicode_test.sh "$PWD/build/rux"
