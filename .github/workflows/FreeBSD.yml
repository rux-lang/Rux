name: FreeBSD

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Allow cancelling superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CMAKE_VERSION: "4.3.3"
  CMAKE_SHA256: "cba4bb7a44edf2877bb6f059932896383babe435b3a8c3b5df48b4aa41c9bb85"

# GitHub has no native FreeBSD runner, so each job runs a FreeBSD VM (via
# QEMU) on an Ubuntu host. Build and Test are separate jobs: the Build VM
# compiles rux and the binary is synced back to the host and uploaded as an
# artifact; the Test VM downloads it and runs the suite. Each job boots its
# own VM, so the toolchain is installed in both (the Test VM also needs the
# Clang runtime libraries the binary links against).
jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            vm_arch: x86_64
            artifact: rux-freebsd-x86_64
          - arch: aarch64
            label: AArch64
            vm_arch: aarch64
            artifact: rux-freebsd-aarch64
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          arch: ${{ matrix.vm_arch }}
          usesh: true
          envs: 'CMAKE_VERSION CMAKE_SHA256'
          # FreeBSD packages CMake 3.31, so build the pinned CMake release once
          # and cache the prepared VM image for subsequent workflow runs.
          cache-after-prepare: true
          prepare: |
            set -e
            pkg install -y llvm22 cmake ninja
            archive="/tmp/cmake-${CMAKE_VERSION}.tar.gz"
            source="/tmp/cmake-${CMAKE_VERSION}"
            build="/tmp/cmake-build"
            prefix="/opt/cmake-${CMAKE_VERSION}"

            fetch -o "$archive" \
              "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}.tar.gz"
            if [ "$(sha256 -q "$archive")" != "$CMAKE_SHA256" ]; then
              echo "CMake source archive checksum mismatch" >&2
              exit 1
            fi

            tar -xzf "$archive" -C /tmp
            cmake -S "$source" -B "$build" -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_COMPILER=clang22 \
              -DCMAKE_CXX_COMPILER=clang++22 \
              -DCMAKE_INSTALL_PREFIX="$prefix" \
              -DBUILD_TESTING=OFF
            cmake --build "$build" --parallel
            cmake --install "$build"
          run: |
            set -e
            export PATH="/opt/cmake-${CMAKE_VERSION}/bin:$PATH"
            cmake --version
            cmake -S . -B Build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_COMPILER=clang++22 \
              -DRUX_WERROR=ON \
              -DRUX_BUILD_TESTS=ON
            cmake --build Build --config Release --parallel
            ctest --test-dir Build --output-on-failure -C Release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: Bin/rux
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test (${{ matrix.label }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            vm_arch: x86_64
            artifact: rux-freebsd-x86_64
          - arch: aarch64
            label: AArch64
            vm_arch: aarch64
            artifact: rux-freebsd-aarch64
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: Bin

      - name: Test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          arch: ${{ matrix.vm_arch }}
          usesh: true
          # The prebuilt binary needs the Clang runtime libraries. The
          # workspace and test manifests resolve first-party packages
          # locally, so no registry or Git client is needed.
          prepare: |
            pkg install -y llvm22
          run: |
            set -e
            chmod +x Bin/rux
            ./Bin/rux check
            ./Bin/rux lint
            ./Bin/rux test --release
