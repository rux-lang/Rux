name: FreeBSD

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Allow cancelling superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# GitHub has no native FreeBSD runner, so each job runs a FreeBSD VM (via
# QEMU) on an Ubuntu host. Build and Test are separate jobs: the Build VM
# compiles rux and the binary is synced back to the host and uploaded as an
# artifact; the Test VM downloads it and runs the suite. Each job boots its
# own VM, so the toolchain is installed in both (the Test VM also needs the
# Clang runtime libraries the binary links against).
jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            vm_arch: x86_64
            artifact: rux-freebsd-x86_64
          - arch: aarch64
            label: AArch64
            vm_arch: aarch64
            artifact: rux-freebsd-aarch64
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          arch: ${{ matrix.vm_arch }}
          usesh: true
          # Cache the prepared VM image so the LLVM and build-tool packages do
          # not need to be downloaded on every workflow run.
          cache-after-prepare: true
          prepare: |
            set -e
            pkg install -y llvm22 cmake-core ninja
          run: |
            set -e
            cmake --version
            cmake -S . -B Build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_COMPILER=clang++22 \
              -DRUX_WERROR=ON \
              -DRUX_BUILD_TESTS=ON
            cmake --build Build --config Release --parallel
            ctest --test-dir Build --output-on-failure -C Release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: Bin/rux
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test (${{ matrix.label }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            vm_arch: x86_64
            artifact: rux-freebsd-x86_64
          - arch: aarch64
            label: AArch64
            vm_arch: aarch64
            artifact: rux-freebsd-aarch64
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: Bin

      - name: Test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          arch: ${{ matrix.vm_arch }}
          usesh: true
          # The prebuilt binary needs the Clang runtime libraries. The
          # workspace and test manifests resolve first-party packages
          # locally, so no registry or Git client is needed.
          prepare: |
            pkg install -y llvm22
          run: |
            set -e
            chmod +x Bin/rux
            ./Bin/rux check
            ./Bin/rux lint
            ./Bin/rux test --release
