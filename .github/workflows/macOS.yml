name: macOS

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Allow cancelling superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CMAKE_VERSION: "4.3.3"
  NINJA_VERSION: "1.13.2"

jobs:
  build:
    name: Build
    runs-on: macos-26-intel
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # macOS ships Apple Clang, which lags upstream and lacks full C++26
      # support, so install LLVM Clang 22 from Homebrew to match Linux.
      - name: Install Clang 22
        run: |
          brew install llvm@22
          echo "$(brew --prefix llvm@22)/bin" >> "$GITHUB_PATH"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: ${{ env.NINJA_VERSION }}

      - name: Configure and build
        run: |
          cmake -S . -B Build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER="$(brew --prefix llvm@22)/bin/clang++" \
            -DRUX_WERROR=ON \
            -DRUX_BUILD_TESTS=ON
          cmake --build Build --config Release --parallel

      - name: Unit tests
        run: ctest --test-dir Build --output-on-failure -C Release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: rux-macos-x64
          path: Bin/rux
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test
    needs: build
    runs-on: macos-26-intel
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: rux-macos-x64
          path: Bin

      # Restore the executable bit (artifacts don't preserve permissions).
      - name: Make binary executable
        run: chmod +x Bin/rux

      - name: Verify Rux workspace
        run: |
          ./Bin/rux check
          ./Bin/rux lint
          ./Bin/rux test --release
