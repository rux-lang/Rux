name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.3.1 && git push origin v0.3.1
on:
  push:
    tags: [ 'v*' ]

# The publish job needs write access to create the GitHub Release.
permissions:
  contents: write

jobs:
  # Fail fast if the pushed tag doesn't match the version in CMakeLists.txt,
  # so a mismatched tag can never produce a release.
  verify-version:
    name: Verify version
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check tag matches project version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          project="$(sed -n 's/.*project([^)]*VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)"
          echo "Tag version:     $tag"
          echo "Project version: $project"
          if [ -z "$project" ]; then
            echo "::error::Could not parse VERSION from CMakeLists.txt"
            exit 1
          fi
          if [ "$tag" != "$project" ]; then
            echo "::error::Tag v$tag does not match CMakeLists.txt version $project"
            exit 1
          fi

  # Build, test, and upload one binary per target OS. Tests run here too, so a
  # broken build or failing suite blocks the release. Each job uploads its
  # binary under the basename the packaging step expects (rux / rux.exe).
  linux:
    name: Linux
    needs: verify-version
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Clang 22
        run: |
          curl --proto '=https' --tlsv1.2 -fsSLo /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: "4.2.0"
          ninjaVersion: latest

      - name: Configure and build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-22
          cmake --build build --config Release

      - name: Test
        run: |
          ./build/rux install Std
          ./build/rux test --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: rux-linux
          path: build/rux
          if-no-files-found: error

  windows:
    name: Windows
    needs: verify-version
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: "4.2.0"
          ninjaVersion: latest

      # Initialize the bundled Visual Studio environment so Clang can find
      # the Windows SDK, CRT headers, and import libraries.
      - name: Configure and build
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -property installationPath
          if (-not $vsPath) {
              throw "Visual Studio installation not found"
          }

          $devShell = Join-Path $vsPath "Common7\Tools\Launch-VsDevShell.ps1"
          & $devShell -Arch amd64 -HostArch amd64 -SkipAutomaticLocation

          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_COMPILER=clang++
          cmake --build build --config Release

      - name: Test
        run: |
          ./build/rux.exe install Std
          ./build/rux.exe test --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: rux-windows
          path: build/rux.exe
          if-no-files-found: error

  macos:
    name: macOS
    needs: verify-version
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # macOS ships Apple Clang, which lags upstream and lacks full C++26
      # support, so install LLVM Clang 22 from Homebrew to match Linux.
      - name: Install Clang 22
        run: |
          brew install llvm@22
          echo "$(brew --prefix llvm@22)/bin" >> "$GITHUB_PATH"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: "4.2.0"
          ninjaVersion: latest

      - name: Configure and build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER="$(brew --prefix llvm@22)/bin/clang++"
          cmake --build build --config Release

      - name: Test
        run: |
          ./build/rux install Std
          ./build/rux test --release

      # Rename so the merged artifact basename is unique and the packaging
      # step can tell it apart from the Linux `rux`.
      - name: Stage binary
        run: |
          mkdir -p dist
          cp build/rux dist/rux-macos

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: rux-macos
          path: dist/rux-macos
          if-no-files-found: error

  release:
    name: Publish release
    needs: [ linux, windows ] # macos disabled
    runs-on: ubuntu-24.04
    steps:
      # Collect every artifact uploaded by the build jobs in this run.
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      # Archive each binary: .tar.gz on Linux/macOS preserves the executable
      # bit, .zip on Windows is the conventional, download-friendly format.
      # Stage the macOS binary as plain `rux` so its archive matches Linux's.
      - name: Package assets
        run: |
          mkdir -p out stage
          chmod +x dist/rux dist/rux-macos
          tar -czf "out/rux-linux.tar.gz" -C dist rux
          zip -j   "out/rux-windows.zip"     dist/rux.exe
          cp dist/rux-macos stage/rux
          tar -czf "out/rux-macos.tar.gz" -C stage rux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
          generate_release_notes: true
          draft: true
