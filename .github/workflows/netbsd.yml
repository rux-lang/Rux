name: NetBSD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: NetBSD x86-64

    steps:
      - uses: actions/checkout@v5

      - name: Build and test in NetBSD VM
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          copyback: false
          prepare: |
            uname -a
            pkg_add cmake gcc14

          run: |
            CXX=$(find /usr/pkg -name "g++*14*" -o -name "g++*14" 2>/dev/null | head -1)
            if [ -z "$CXX" ]; then CXX=$(find /usr/pkg -name "g++*" -type f 2>/dev/null | head -1); fi
            export CXX
            echo "Using CXX=$CXX"
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build --parallel 4
            ctest --test-dir build -C Release --output-on-failure
