name: DragonFly BSD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: DragonFly BSD x86-64

    steps:
      - uses: actions/checkout@v5

      - name: Build and test in DragonFly BSD VM
        uses: vmactions/dragonflybsd-vm@v1
        with:
          usesh: true
          copyback: false
          prepare: |
            uname -a
            pkg install -y cmake llvm gcc14

          run: |
            export LD_LIBRARY_PATH="/usr/local/lib/gcc14:/usr/local/lib"
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++14
            cmake --build build
            ctest --test-dir build -C Release --output-on-failure
