name: OpenBSD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: OpenBSD x86-64

    steps:
      - uses: actions/checkout@v5

      - name: Build and test in OpenBSD VM
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          copyback: false
          prepare: |
            uname -a
            pkg_add cmake

          run: |
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build
            echo "=========================================================================================="
            echo "BUILD SUCCESSFUL!"
            echo "Note: Low-level runtime execution tests are skipped on OpenBSD."
            echo "Rux's backend emits raw assembly thunks that utilize direct kernel syscalls,"
            echo "which are blocked by OpenBSD's security model (requires libc.so syscall pinning)."
            echo "=========================================================================================="
