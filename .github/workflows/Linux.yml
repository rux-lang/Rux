name: Linux

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Allow cancelling superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CMAKE_VERSION: "4.3.4"
  NINJA_VERSION: "1.13.2"

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Clang 22
        run: |
          curl --proto '=https' --tlsv1.2 -fsSLo /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: ${{ env.NINJA_VERSION }}

      - name: Configure and build
        run: |
          cmake -S . -B Build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-22 \
            -DRUX_WERROR=ON \
            -DRUX_BUILD_TESTS=ON
          cmake --build Build --config Release --parallel

      - name: Unit tests
        run: ctest --test-dir Build --output-on-failure -C Release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: rux-linux-x64
          path: Bin/rux
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: rux-linux-x64
          path: Bin

      # Restore the executable bit (artifacts don't preserve permissions).
      - name: Make binary executable
        run: chmod +x Bin/rux

      - name: Check Rux formatting
        run: |
          set -e
          manifest_count=$(find Packages Tests -type f -name Rux.toml -print | wc -l | tr -d '[:space:]')
          find Packages Tests -type f -name Rux.toml -print | while IFS= read -r manifest; do
            ./Bin/rux --manifest "$manifest" fmt --check
          done
          printf '[PASSED] Rux formatting (%s packages)\n' "$manifest_count"

      - name: Verify Rux workspace
        run: |
          ./Bin/rux check
          ./Bin/rux lint
          ./Bin/rux test --release
