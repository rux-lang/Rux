name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            Welcome to Rux.

            Thank you for opening your first issue. We appreciate your interest in helping improve the project.

            To help us review your report efficiently, please include as much relevant information as possible, such as reproduction steps, expected behavior, actual behavior, and your Rux version.

            A maintainer will review your issue when available.

          pr-message: |
            Welcome to Rux, and thank you for your first contribution.

            We appreciate your effort in helping improve the language and its ecosystem.

            Please ensure all relevant tests pass and that any necessary documentation has been updated.

            A maintainer will review your pull request as soon as possible.
