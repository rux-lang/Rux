name: Windows

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    # windows-latest is x86-64, so Rux's PE32+ backend emits executables that
    # run natively here. The I/O thunks resolve against the real GetStdHandle /
    # WriteFile / ReadFile imports.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      # Use a recent CMake and Ninja instead of relying on the runner image.
      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      # Load the MSVC developer environment so CMake can use cl/link directly
      # without needing to discover a full Visual Studio installation.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # Build with Ninja against MSVC. This avoids the Visual Studio generator
      # discovery path that can fail on some Windows runner images.
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=cl -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
