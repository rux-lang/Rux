name: Windows

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Allow cancelling superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: "4.2.0"
          ninjaVersion: latest

      # Initialize the bundled Visual Studio environment so Clang can find
      # the Windows SDK, CRT headers, and import libraries.
      - name: Configure and build
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -property installationPath
          if (-not $vsPath) {
              throw "Visual Studio installation not found"
          }

          $devShell = Join-Path $vsPath "Common7\Tools\Launch-VsDevShell.ps1"
          & $devShell -Arch amd64 -HostArch amd64 -SkipAutomaticLocation

          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_COMPILER=clang++ `
            -DRUX_WERROR=ON `
            -DRUX_BUILD_TESTS=ON
          cmake --build build --config Release

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: rux-windows-x64.exe
          path: Bin/Release/rux.exe
          if-no-files-found: error

  test:
    name: Test
    needs: build
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: rux-windows-x64.exe
          path: Bin/Release

      # The test packages depend on the Std package, so install it first.
      - name: Install Std
        run: ./Bin/Release/rux.exe install Std

      # Workspace mode: run from the repo root so `rux test` discovers Tests/.
      - name: Test
        run: ./Bin/Release/rux.exe test --release
