name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags: [ 'v*' ]

# Build jobs only need to read the repository. The publish job elevates this
# permission narrowly when it creates the draft GitHub Release.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CMAKE_VERSION: "4.3.3"
  NINJA_VERSION: "1.13.2"

jobs:
  # Fail fast if the pushed tag doesn't match the version in CMakeLists.txt,
  # so a mismatched tag can never produce a release.
  verify-version:
    name: Verify version
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check tag matches project version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          project="$(sed -n 's/.*project([^)]*VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)"
          echo "Tag version:     $tag"
          echo "Project version: $project"
          if [ -z "$project" ]; then
            echo "::error::Could not parse VERSION from CMakeLists.txt"
            exit 1
          fi
          if [ "$tag" != "$project" ]; then
            echo "::error::Tag v$tag does not match CMakeLists.txt version $project"
            exit 1
          fi

  # Build, test, and upload one binary per supported OS/architecture pair.
  # Tests run here too, so a broken build or failing suite blocks the release.
  # Each job uploads its binary under the basename the packaging step expects
  # (rux / rux.exe).
  # GitHub has no native FreeBSD runner, so build and test inside a FreeBSD
  # VM and sync the resulting binary back to the Ubuntu host for upload.
  freebsd:
    name: FreeBSD (${{ matrix.label }})
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            vm_arch: x86_64
            artifact: rux-freebsd-x86_64
          - arch: aarch64
            label: AArch64
            vm_arch: aarch64
            artifact: rux-freebsd-aarch64
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build and test in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          arch: ${{ matrix.vm_arch }}
          usesh: true
          cache-after-prepare: true
          prepare: |
            set -e
            pkg install -y llvm22 cmake-core ninja
          run: |
            set -e
            cmake --version
            cmake -S . -B Build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_COMPILER=clang++22 \
              -DRUX_WERROR=ON \
              -DRUX_BUILD_TESTS=ON
            cmake --build Build --config Release --parallel
            ctest --test-dir Build --output-on-failure -C Release
            ./Bin/rux check
            ./Bin/rux lint
            ./Bin/rux test --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: Bin/rux
          if-no-files-found: error
          retention-days: 7

  linux:
    name: Linux (${{ matrix.label }})
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            runner: ubuntu-24.04
            artifact: rux-linux-x86_64
          - arch: aarch64
            label: AArch64
            runner: ubuntu-24.04-arm
            artifact: rux-linux-aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Clang 22
        run: |
          curl --proto '=https' --tlsv1.2 -fsSLo /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: ${{ env.NINJA_VERSION }}

      - name: Configure and build
        run: |
          cmake -S . -B Build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-22 \
            -DRUX_WERROR=ON \
            -DRUX_BUILD_TESTS=ON
          cmake --build Build --config Release --parallel

      - name: Unit tests
        run: ctest --test-dir Build --output-on-failure -C Release

      - name: Check Rux formatting
        if: matrix.arch == 'x86_64'
        run: |
          set -e
          manifest_count=$(find Packages Tests -type f -name Rux.toml -print | wc -l | tr -d '[:space:]')
          find Packages Tests -type f -name Rux.toml -print | while IFS= read -r manifest; do
            ./Bin/rux --manifest "$manifest" fmt --check
          done
          printf '[PASSED] Rux formatting (%s packages)\n' "$manifest_count"

      - name: Verify Rux workspace
        run: |
          ./Bin/rux check
          ./Bin/rux lint
          ./Bin/rux test --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: Bin/rux
          if-no-files-found: error
          retention-days: 7

  macos:
    name: macOS (${{ matrix.label }})
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            runner: macos-26-intel
            artifact: rux-macos-x86_64
          - arch: aarch64
            label: AArch64
            runner: macos-26
            artifact: rux-macos-aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Apple Clang lacks the C++26 support Rux needs, so use the same
      # upstream LLVM release as the Linux and FreeBSD builds.
      - name: Install Clang 22
        run: |
          brew install llvm@22
          echo "$(brew --prefix llvm@22)/bin" >> "$GITHUB_PATH"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: ${{ env.NINJA_VERSION }}

      - name: Configure and build
        run: |
          cmake -S . -B Build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER="$(brew --prefix llvm@22)/bin/clang++" \
            -DRUX_WERROR=ON \
            -DRUX_BUILD_TESTS=ON
          cmake --build Build --config Release --parallel

      - name: Unit tests
        run: ctest --test-dir Build --output-on-failure -C Release

      - name: Verify Rux workspace
        run: |
          ./Bin/rux check
          ./Bin/rux lint
          ./Bin/rux test --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: Bin/rux
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Windows (${{ matrix.label }})
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            label: x86-64
            runner: windows-2025
            vs_arch: amd64
            compiler_target: x86_64-pc-windows-msvc
            artifact: rux-windows-x86_64
          - arch: aarch64
            label: AArch64
            runner: windows-11-arm
            vs_arch: arm64
            compiler_target: aarch64-pc-windows-msvc
            artifact: rux-windows-aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: ${{ env.NINJA_VERSION }}

      # Initialize the bundled Visual Studio environment so Clang can find
      # the Windows SDK, CRT headers, and import libraries.
      - name: Configure, build, and run unit tests
        shell: pwsh
        run: |
          ./.github/scripts/Enter-VsDevEnv.ps1 -Arch ${{ matrix.vs_arch }}

          cmake -S . -B Build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_COMPILER=clang++ `
            -DCMAKE_CXX_COMPILER_TARGET=${{ matrix.compiler_target }} `
            -DRUX_WERROR=ON `
            -DRUX_BUILD_TESTS=ON
          cmake --build Build --config Release --parallel
          ctest --test-dir Build --output-on-failure -C Release

      - name: Verify Rux workspace
        shell: pwsh
        run: |
          ./.github/scripts/Enter-VsDevEnv.ps1 -Arch ${{ matrix.vs_arch }}

          ./Bin/rux.exe check
          ./Bin/rux.exe lint
          ./Bin/rux.exe test --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: Bin/rux.exe
          if-no-files-found: error
          retention-days: 7

      # Package the freshly built binary into a per-user MSI installer.
      - name: Build MSI installer
        if: matrix.arch == 'x86_64'
        shell: pwsh
        run: ./Packaging/Windows/Msi/Build.ps1 -RuxExe Bin/rux.exe

      - name: Upload MSI artifact
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v7
        with:
          name: rux-windows-x86_64-msi
          path: Packaging/Windows/Msi/out/rux-windows.msi
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: [ freebsd, linux, macos, windows ]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      # Keep each artifact in its own directory because binaries from the
      # same operating system have identical basenames.
      - name: Download x86-64 binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rux-*-x86_64
          path: dist

      - name: Download AArch64 binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rux-*-aarch64
          path: dist

      - name: Download Windows MSI artifact
        uses: actions/download-artifact@v8
        with:
          name: rux-windows-x86_64-msi
          path: dist/rux-windows-x86_64-msi

      # Unix archives preserve executable permissions; zip is conventional
      # for standalone Windows binaries. Keep the old unqualified x86-64
      # filenames as compatibility aliases.
      - name: Package assets
        run: |
          set -e
          mkdir -p out
          for platform in linux macos freebsd; do
            for arch in x86_64 aarch64; do
              source="dist/rux-${platform}-${arch}/rux"
              chmod +x "$source"
              tar -czf "out/rux-${platform}-${arch}.tar.gz" \
                -C "dist/rux-${platform}-${arch}" rux
            done
          done
          for arch in x86_64 aarch64; do
            zip -j "out/rux-windows-${arch}.zip" \
              "dist/rux-windows-${arch}/rux.exe"
          done
          cp dist/rux-windows-x86_64-msi/rux-windows.msi \
            out/rux-windows-x86_64.msi

          # Compatibility aliases; the current installers consume a subset.
          cp out/rux-freebsd-x86_64.tar.gz out/rux-freebsd.tar.gz
          cp out/rux-linux-x86_64.tar.gz out/rux-linux.tar.gz
          cp out/rux-macos-x86_64.tar.gz out/rux-macos.tar.gz
          cp out/rux-windows-x86_64.zip out/rux-windows.zip
          cp out/rux-windows-x86_64.msi out/rux-windows.msi

          (cd out && sha256sum rux-* > SHA256SUMS)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: true
