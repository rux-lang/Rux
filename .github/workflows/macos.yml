name: macOS

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Allow cancelling superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # macOS ships Apple Clang, which lags upstream and lacks full C++26
      # support, so install LLVM Clang 22 from Homebrew to match Linux.
      - name: Install Clang 22
        run: |
          brew install llvm@22
          echo "$(brew --prefix llvm@22)/bin" >> "$GITHUB_PATH"

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v4.3.3
        with:
          cmakeVersion: "4.2.0"
          ninjaVersion: latest

      - name: Configure and build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER="$(brew --prefix llvm@22)/bin/clang++" \
            -DRUX_WERROR=ON
          cmake --build build --config Release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: rux-macos-arm64
          path: Bin/Release/rux
          if-no-files-found: error

  test:
    name: Test
    needs: build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download binary artifact
        uses: actions/download-artifact@v8
        with:
          name: rux-macos-arm64
          path: Bin/Release

      # Restore the executable bit (artifacts don't preserve permissions).
      - name: Make binary executable
        run: chmod +x Bin/Release/rux

      # The test packages depend on these packages, so install them first.
      # Each install resolves its own transitive dependencies.
      - name: Install test dependencies
        run: |
          for pkg in Rux Format Io Memory Text; do
            ./Bin/Release/rux install "$pkg"
          done

      # Workspace mode: run from the repo root so `rux test` discovers Tests/.
      - name: Test
        run: ./Bin/Release/rux test --release
